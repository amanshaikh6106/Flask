<!DOCTYPE html>
<html lang="en">
<head>
<title>Registration Successful</title>
</head>
<body>

<div class="container">
    <h2>Registration Successful!</h2>

    <p><strong>Gender:</strong> {{ gender }}</p>
</div>

</body>
</html>
